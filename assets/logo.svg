<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="logo-accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007aff" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    <radialGradient id="logo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#007aff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#007aff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Sleek dark background with thin border -->
  <rect width="64" height="64" rx="16" fill="#030303" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- Ambient blue center glow -->
  <circle cx="32" cy="32" r="24" fill="url(#logo-glow)" />
  <!-- IDP Branding Text -->
  <text x="32" y="41" font-family="'Outfit', -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="900" text-anchor="middle" letter-spacing="-1.5">
    <tspan fill="url(#logo-accent-grad)">I</tspan><tspan fill="#f5f5f7">DP</tspan>
  </text>
</svg>
